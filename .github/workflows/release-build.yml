name: Release Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build MDViewer
    runs-on: macos-15
    env:
      APPLE_TEAM_ID: EZCN55TA7J

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build release app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          xcodebuild \
            -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY=- \
            build

      - name: Import Developer ID certificate
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Build signed release app
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          xcodebuild \
            -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            build

      - name: Verify signed app
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          codesign --verify --deep --strict --verbose=2 build/DerivedData/Build/Products/Release/MDViewer.app

      - name: Package app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          cd build/DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent MDViewer.app MDViewer.app.zip

      - name: Create notarization archive
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          cd build/DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent MDViewer.app MDViewer-notary.zip

      - name: Notarize app
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit \
            build/DerivedData/Build/Products/Release/MDViewer-notary.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          xcrun stapler staple build/DerivedData/Build/Products/Release/MDViewer.app
          xcrun stapler validate build/DerivedData/Build/Products/Release/MDViewer.app
          spctl -a -vvv -t exec build/DerivedData/Build/Products/Release/MDViewer.app

      - name: Package notarized app
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          cd build/DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent MDViewer.app MDViewer.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDViewer-release-app
          path: build/DerivedData/Build/Products/Release/MDViewer.app.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              build/DerivedData/Build/Products/Release/MDViewer.app.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              build/DerivedData/Build/Products/Release/MDViewer.app.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "MDViewer $GITHUB_REF_NAME" \
              --generate-notes
          fi
