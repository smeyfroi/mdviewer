name: Release Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build MDViewer
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build release app
        run: |
          xcodebuild \
            -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY=- \
            build

      - name: Package app
        run: |
          cd build/DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent MDViewer.app MDViewer.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDViewer-release-app
          path: build/DerivedData/Build/Products/Release/MDViewer.app.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              build/DerivedData/Build/Products/Release/MDViewer.app.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              build/DerivedData/Build/Products/Release/MDViewer.app.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "MDViewer $GITHUB_REF_NAME" \
              --generate-notes
          fi
