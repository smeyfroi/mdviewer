name: Release Build

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build MDViewer
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build release app
        run: |
          xcodebuild \
            -project MDViewer.xcodeproj \
            -scheme MDViewer \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          cd build/DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent MDViewer.app MDViewer.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDViewer-release-app
          path: build/DerivedData/Build/Products/Release/MDViewer.app.zip
